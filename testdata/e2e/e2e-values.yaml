image:
  repository: jti
  tag: e2e
  pullPolicy: IfNotPresent

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: [ "ALL" ]

webhook:
  annotations:
    cert-manager.io/inject-ca-from: jti/java-truststore-injection-webhook-certs
